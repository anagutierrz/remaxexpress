<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solicitud de Financiamiento | Banreservas</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-br: #004677;
            --amarillo-br: #FFCC00;
            --gris-fondo: #F4F7F9;
            --texto-oscuro: #333333;
            --borde-input: #D1D5DB;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--gris-fondo);
            color: var(--texto-oscuro);
            padding-bottom: 40px;
        }

        header {
            background-color: var(--azul-br);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .container {
            max-width: 500px;
            margin: 15px auto;
            padding: 0 12px;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        /* Barra de Progreso */
        .progress-container { margin-bottom: 25px; }
        .progress-text {
            display: flex; justify-content: space-between;
            font-size: 13px; margin-bottom: 8px; color: #555; font-weight: 600;
        }
        .progress-bar { background: #E5E7EB; height: 6px; border-radius: 10px; overflow: hidden; }
        .progress-fill {
            background: var(--azul-br); width: 25%; height: 100%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 {
            color: var(--azul-br); font-size: 20px; margin-bottom: 25px;
            border-bottom: 1px solid #EEE; padding-bottom: 12px; font-weight: 700;
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        
        input, select {
            width: 100%; padding: 14px; border: 1px solid var(--borde-input);
            border-radius: 8px; font-size: 16px; outline: none; background: #fff;
        }

        input:focus, select:focus { border-color: var(--azul-br); }

        .btn-primary {
            background-color: var(--amarillo-br); color: var(--azul-br);
            border: none; width: 100%; padding: 16px; border-radius: 8px;
            font-size: 15px; font-weight: 700; text-transform: uppercase;
            cursor: pointer; margin-top: 10px;
        }

        .btn-back {
            display: block; text-align: center; margin-top: 20px;
            color: var(--azul-br); text-decoration: underline; font-size: 14px; cursor: pointer;
        }

        /* Control de Pasos */
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .success-msg { text-align: center; padding: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Banreservas_Logo.svg/1024px-Banreservas_Logo.svg.png" alt="Banreservas" height="28">
    </div>
    <div style="color: white; font-size: 13px; font-weight: 600;">ES ⌄</div>
</header>

<div class="container">
    <div class="card">
        <div class="progress-container" id="progress-area">
            <div class="progress-text">
                <span id="step-label">Paso 1 de 4</span>
                <span id="step-percentage">25% completado</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <form id="loan-form">
            <div class="step active" id="step1">
                <h1>Datos Personales</h1>
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" name="nombre" placeholder="Ej. Juan" required>
                </div>
                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" name="apellido" placeholder="Ej. Pérez" required>
                </div>
                <div class="form-group">
                    <label>Cédula</label>
                    <input type="tel" name="cedula" placeholder="001-0000000-0" required>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" name="email" placeholder="correo@ejemplo.com" required>
                </div>
                <button type="button" class="btn-primary" onclick="nextStep(2)">Siguiente</button>
            </div>

            <div class="step" id="step2">
                <h1>Detalles del Vehículo</h1>
                <div class="form-group">
                    <label>Marca</label>
                    <select name="marca" required>
                        <option value="" disabled selected>Seleccione Marca</option>
                        <option value="Toyota">Toyota</option>
                        <option value="Honda">Honda</option>
                        <option value="Hyundai">Hyundai</option>
                        <option value="Kia">Kia</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Modelo</label>
                    <input type="text" name="modelo" placeholder="Ej. Hilux" required>
                </div>
                <div class="form-group">
                    <label>Año</label>
                    <input type="number" name="anio" placeholder="Ej. 2024" required>
                </div>
                <div class="form-group)
                    <label>Edad del Solicitante</label>
                    <input type="number" name="edad" placeholder="Ej. 25" required>
                </div>
                <button type="button" class="btn-primary" onclick="submitForm()">Finalizar Solicitud</button>
                <span class="btn-back" onclick="nextStep(1)">Volver</span>
            </div>

            <div class="step" id="step-success">
                <div class="success-msg">
                    <h1 style="border:none">¡Solicitud Enviada!</h1>
                    <p>Hemos recibido sus datos. Un oficial se pondrá en contacto con usted a la brevedad.</p>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    function nextStep(step) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');

        const fill = document.getElementById('progress-fill');
        const label = document.getElementById('step-label');
        const percentage = document.getElementById('step-percentage');

        if(step === 1) {
            fill.style.width = "25%";
            label.innerText = "Paso 1 de 4";
            percentage.innerText = "25% completado";
        } else if(step === 2) {
            fill.style.width = "50%";
            label.innerText = "Paso 2 de 4";
            percentage.innerText = "50% completado";
        }
        window.scrollTo(0,0);
    }

    async function submitForm() {
        const form = document.getElementById('loan-form');
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        // Aquí es donde envías los datos por correo. 
        // Puedes usar un Webhook de n8n o un servicio como Formspree.
        console.log("Enviando datos:", data);

        // Simulación de envío
        document.getElementById('progress-area').style.display = 'none';
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step-success').classList.add('active');
        
        /* Ejemplo para conectar con un servicio de correo:
        fetch('TU_WEBHOOK_URL', {
            method: 'POST',
            body: JSON.stringify(data),
            headers: { 'Content-Type': 'application/json' }
        });
        */
    }
</script>

</body>
</html>
